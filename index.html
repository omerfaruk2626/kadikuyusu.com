<div class="footer">
    <div>
        <audio id="radio" loop >
            <source src="https://nmicenotrt.mediatriple.net/trt_turku.aac" type="audio/mpeg">
        </audio>
        <button onclick="toggleRadio()">Play▶️</button>
        <button onclick="pauseRadio()">Mute⏸️</button>
        <input type="range" min="0" max="1" step="0.01" value="0.03" onchange="setVolume(this.value)" style="width: 80px; position: relative; top: 5px; ">
    </div>
    <p>Code Fighters. All rights reserved. © 2024</p>
</div>
<script>
  var radio = document.getElementById("radio");

  function toggleRadio() {
      if (radio.paused) {
          radio.play();
      } else {
          radio.pause();
      }
      radio.volume = 0.03;
  }

  function pauseRadio() {
      radio.pause();
  }

  function setVolume(volume) {
      radio.volume = parseFloat(volume);
  }

  radio.addEventListener('playing', function() {
      radio.volume = 0.03;
  });
</script>
